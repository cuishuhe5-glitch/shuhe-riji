name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS and portable artifacts
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS app
        run: |
          python -m riji package-app --output dist --mode desktop --portable
          python -m riji package-dmg --output dist --mode desktop
          ditto -c -k --keepParent "dist/书赫日报助手.app" "dist/shuhe-riji-macos-app.zip"

      - name: Build Windows portable package
        run: python -m riji package-windows --output dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/shuhe-riji-macos-app.zip
            dist/shuhe-riji-macos.dmg
            dist/shuhe-riji-windows-portable.zip

  build-windows-exe:
    name: Build Windows EXE artifact
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows EXE
        shell: pwsh
        run: .\scripts\build_windows_exe.ps1 -Output dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/shuhe-riji-windows-exe.zip
