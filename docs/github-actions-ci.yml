name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile package
        run: python -m compileall riji

      - name: CLI help
        run: |
          python -m riji --version
          python -m riji panel --help
          python -m riji desktop --help
          python -m riji package-windows --help

      - name: Build Windows portable package
        run: python -m riji package-windows --output dist

      - name: Import platform helpers
        run: |
          python - <<'PY'
          from riji import autostart, capture, permissions, window
          print("permissions", permissions.status()["platform"])
          print("frontmost", window.frontmost())
          print("autostart", autostart.status()["installed"])
          PY
